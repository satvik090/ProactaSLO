services:
  app:
    build:
      context: .
      dockerfile_inline: |
        FROM python:3.11-slim
        WORKDIR /app
        ENV PYTHONDONTWRITEBYTECODE=1
        ENV PYTHONUNBUFFERED=1
        COPY requirements.txt .
        RUN pip install --no-cache-dir -r requirements.txt
        COPY . .
        EXPOSE 8000
        CMD ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    container_name: proactaslo-app
    env_file:
      - .env.example
    ports:
      - "8000:8000"
    depends_on:
      kafka:
        condition: service_started
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
      prometheus:
        condition: service_started
    networks:
      - proactaslo-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: proactaslo-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - proactaslo-net

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: proactaslo-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
      - "29092:29092"
    networks:
      - proactaslo-net

  redis:
    image: redis:7.2-alpine
    container_name: proactaslo-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - proactaslo-net

  postgres:
    image: postgres:16-alpine
    container_name: proactaslo-postgres
    environment:
      POSTGRES_DB: proactaslo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d proactaslo"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - proactaslo-net

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: proactaslo-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - proactaslo-net

  grafana:
    image: grafana/grafana:10.4.2
    container_name: proactaslo-grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    entrypoint:
      - /bin/sh
      - -c
      - |
        mkdir -p /etc/grafana/provisioning/datasources /etc/grafana/provisioning/dashboards /var/lib/grafana/dashboards
        cat > /etc/grafana/provisioning/datasources/prometheus.yml <<'EOF'
        apiVersion: 1
        datasources:
          - name: Prometheus
            uid: Prometheus
            type: prometheus
            access: proxy
            url: http://prometheus:9090
            isDefault: true
        EOF
        cat > /etc/grafana/provisioning/dashboards/proactaslo.yml <<'EOF'
        apiVersion: 1
        providers:
          - name: ProactaSLO
            orgId: 1
            folder: ProactaSLO
            type: file
            disableDeletion: false
            updateIntervalSeconds: 10
            allowUiUpdates: true
            options:
              path: /var/lib/grafana/dashboards
        EOF
        /run.sh
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/dashboard.json:/var/lib/grafana/dashboards/dashboard.json:ro
      - grafana-data:/var/lib/grafana
    networks:
      - proactaslo-net

networks:
  proactaslo-net:
    name: proactaslo-net
    driver: bridge

volumes:
  redis-data:
  postgres-data:
  prometheus-data:
  grafana-data:
